<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="切换主题">
            <span class="theme-icon">🌙</span>
        </button>
        <h1>扫雷游戏</h1>
        
        <div class="difficulty-selector">
            <label for="difficulty">难度选择:</label>
            <select id="difficulty">
                <option value="beginner">初级 (9×9, 10雷)</option>
                <option value="intermediate">中级 (16×16, 40雷)</option>
                <option value="expert">高级 (16×30, 99雷)</option>
                <option value="custom">自定义</option>
            </select>
        </div>
        
        <div id="custom-difficulty" class="custom-difficulty hidden">
            <div class="custom-input-group">
                <label for="custom-rows">行数:</label>
                <input type="number" id="custom-rows" min="1" max="50" value="9">
            </div>
            <div class="custom-input-group">
                <label for="custom-cols">列数:</label>
                <input type="number" id="custom-cols" min="1" max="50" value="9">
            </div>
            <div class="custom-input-group">
                <label for="custom-mines">地雷数:</label>
                <input type="number" id="custom-mines" min="1" value="10">
            </div>
            <button id="confirm-custom">确认</button>
            <div id="custom-error" class="custom-error hidden"></div>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <span class="label">剩余地雷:</span>
                <span id="mine-count" class="value">10</span>
            </div>
            <div class="info-item">
                <span class="label">用时:</span>
                <span id="timer" class="value">0</span>
                <span class="label">秒</span>
            </div>
            <button id="restart-btn">重新开始</button>
        </div>
        
        <div id="game-board" class="game-board">
            <!-- 棋盘将通过JavaScript动态生成 -->
        </div>
        
        <div id="game-message" class="game-message"></div>
        
        <div class="game-instructions">
            <div class="instruction-item">
                <span class="key">左键</span>
                <span class="action">翻开格子</span>
            </div>
            <div class="instruction-divider">|</div>
            <div class="instruction-item">
                <span class="key">右键</span>
                <span class="action">标记/取消旗子</span>
            </div>
            <div class="instruction-divider">|</div>
            <div class="instruction-item">
                <span class="key">左键数字</span>
                <span class="action">和弦点击</span>
            </div>
        </div>
        
        <div class="game-stats">
            <h3>游戏统计</h3>
            <div class="stats-container">
                <div class="stats-row">
                    <div class="stats-label">难度</div>
                    <div class="stats-value">总局数</div>
                    <div class="stats-value">胜局</div>
                    <div class="stats-value">胜率</div>
                </div>
                <div class="stats-row" id="stats-beginner">
                    <div class="stats-label">初级</div>
                    <div class="stats-value" id="beginner-games">-</div>
                    <div class="stats-value" id="beginner-wins">-</div>
                    <div class="stats-value" id="beginner-winrate">-</div>
                </div>
                <div class="stats-row" id="stats-intermediate">
                    <div class="stats-label">中级</div>
                    <div class="stats-value" id="intermediate-games">-</div>
                    <div class="stats-value" id="intermediate-wins">-</div>
                    <div class="stats-value" id="intermediate-winrate">-</div>
                </div>
                <div class="stats-row" id="stats-expert">
                    <div class="stats-label">高级</div>
                    <div class="stats-value" id="expert-games">-</div>
                    <div class="stats-value" id="expert-wins">-</div>
                    <div class="stats-value" id="expert-winrate">-</div>
                </div>
                <div class="stats-row" id="stats-custom">
                    <div class="stats-label">自定义</div>
                    <div class="stats-value" id="custom-games">-</div>
                    <div class="stats-value" id="custom-wins">-</div>
                    <div class="stats-value" id="custom-winrate">-</div>
                </div>
            </div>
            <button id="clear-stats-btn" class="clear-stats-btn">清空统计</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
